<style>
.widget-horarios__table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-bottom: 10px;
    table-layout: fixed;
    border: none;
}

.widget-horarios__table caption {
    font-weight: bold;
    font-size: 12px;
    padding: 2px 0;
    text-align: center;
}

.widget-horarios__table th {
    font-size: 10px;
    padding: 2px 1px;
    text-align: center;
    background-color: #f0f0f0;
    border-top: 1px solid #ccc;
    border-right: 1px solid #ccc;
    border-bottom: 1px solid #ccc;
    border-left: none;
    font-weight: bold;
}

.widget-horarios__table tbody tr {
    height: 20px;
}

.widget-horarios__table td {
    font-size: 10px;
    padding: 2px 1px;
    text-align: center;
    border-top: none;
    border-right: 1px solid #ccc;
    border-bottom: 1px solid #ccc;
    border-left: none;
    vertical-align: middle;
    font-weight: 600;
}

.widget-horarios__table td.alterado {
    color: #c00;
}

.widget-horarios__table td.slot-extra-oculto,
.widget-horarios__table th.col-sab-oculto,
.widget-horarios__table td.col-sab-oculto {
    border: none;
    background: white;
}

.widget-horarios__table .interval {
    font-size: 8px;
    padding: 0;
    color: #999;
    font-style: italic;
    font-weight: normal;
    background-color: #fafafa;
}

.widget-horarios__link {
    display: block;
    text-align: center;
    font-size: 12px;
    margin-top: 2px;
}
</style>

<div class="widget-horarios widget">
    <h4 class="widget__title" id="widget-horarios-titulo">Aulas da Semana</h4>
    <div id="widget-horarios-content">
        <p style="font-size:11px;text-align:center;color:#999;">Carregando...</p>
    </div>
</div>

<script>
(function() {
    var API_URL = 'https://coordenacao.ifac.si/api/horarios';
    var DIAS = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

    function carregarHorarios() {
        var container = document.getElementById('widget-horarios-content');
        var titulo = document.getElementById('widget-horarios-titulo');

        fetch(API_URL)
            .then(function(r) {
                if (!r.ok) throw new Error();
                return r.json();
            })
            .then(function(data) {
                var inicio = data.inicio.split('-');
                titulo.textContent = 'Aulas da Semana (' + inicio[2] + '/' + inicio[1] + ')';

                var numDias = data.datas.length;

                // Número máximo de slots vem da própria API
                var maxSlots = 5;
                for (var p = 0; p < data.periodos.length; p++) {
                    if (data.periodos[p].slots.length > maxSlots) {
                        maxSlots = data.periodos[p].slots.length;
                    }
                }

                // Verificar se sábado tem aula
                var temSabado = false;
                if (numDias >= 6) {
                    for (var p = 0; p < data.periodos.length; p++) {
                        for (var s = 0; s < maxSlots; s++) {
                            var cell = data.periodos[p].slots[s][5];
                            if (cell && cell.s) { temSabado = true; break; }
                        }
                        if (temSabado) break;
                    }
                }
                var diasMostrar = temSabado ? 6 : 5;

                var html = '';
                for (var p = 0; p < data.periodos.length; p++) {
                    if (!temAulas(data.periodos[p], diasMostrar, maxSlots)) continue;
                    html += renderTabela(data.periodos[p], diasMostrar, maxSlots);
                }
                html += '<a class="widget-horarios__link" href="/horarios/">Ver horários completos →</a>';
                container.innerHTML = html;
            })
            .catch(function() {
                container.innerHTML = '<p style="font-size:11px;text-align:center;color:#666;">' +
                    'Não foi possível carregar.<br><a href="/horarios/">Ver horários</a></p>';
            });
    }

    function temAulas(periodo, numDias, maxSlots) {
        for (var s = 0; s < maxSlots; s++) {
            for (var d = 0; d < numDias; d++) {
                var cell = periodo.slots[s][d];
                if (cell && cell.s) return true;
            }
        }
        return false;
    }

    function renderTabela(periodo, numDias, maxSlots) {
        // Verificar se este período tem aulas no sábado (último dia)
        var sabVazio = numDias >= 6;
        if (sabVazio) {
            for (var s = 0; s < maxSlots; s++) {
                var c = periodo.slots[s] && periodo.slots[s][numDias - 1];
                if (c && c.s) { sabVazio = false; break; }
            }
        }

        // Calcular rowspans por coluna
        // Bloco 1: slots 0-2 (antes do intervalo), Bloco 2: slots 3-4 (depois)
        // Slots >= 5 são renderizados à parte: só aparecem na coluna Sáb
        var blocks = [[0,1,2], [3,4]];
        var grid = [];
        for (var s = 0; s < maxSlots; s++) {
            grid[s] = [];
            for (var d = 0; d < numDias; d++) {
                grid[s][d] = { render: true, span: 1, alt: false };
            }
        }

        for (var d = 0; d < numDias; d++) {
            for (var b = 0; b < blocks.length; b++) {
                var block = blocks[b];
                var i = 0;
                while (i < block.length) {
                    var startSlot = block[i];
                    var val = periodo.slots[startSlot] && periodo.slots[startSlot][d] ? periodo.slots[startSlot][d].s : null;
                    var hasAlt = periodo.slots[startSlot] && periodo.slots[startSlot][d] && periodo.slots[startSlot][d].alt;
                    var span = 1;
                    while (i + span < block.length) {
                        var nextSlot = block[i + span];
                        var nextCell = periodo.slots[nextSlot] && periodo.slots[nextSlot][d];
                        var nextVal = nextCell ? nextCell.s : null;
                        if (nextVal === val) {
                            if (nextCell && nextCell.alt) hasAlt = true;
                            span++;
                        } else {
                            break;
                        }
                    }
                    grid[startSlot][d].span = span;
                    grid[startSlot][d].alt = hasAlt;
                    for (var k = 1; k < span; k++) {
                        grid[block[i + k]][d].render = false;
                    }
                    i += span;
                }
            }
        }

        var dSab = numDias - 1;
        var colsVisiveis = sabVazio ? numDias - 1 : numDias;

        var html = '<table class="widget-horarios__table">';
        html += '<caption>' + periodo.nome + '</caption>';
        html += '<thead><tr>';
        for (var d = 0; d < numDias; d++) {
            var oculto = sabVazio && d === dSab;
            var bleft = d === 0 && !oculto ? ' style="border-left:1px solid #ccc"' : '';
            if (oculto) {
                html += '<th class="col-sab-oculto"></th>';
            } else {
                html += '<th' + bleft + '>' + DIAS[d] + '</th>';
            }
        }
        html += '</tr></thead><tbody>';

        for (var s = 0; s < maxSlots; s++) {
            if (s === 3) {
                var intervalHtml = '<tr><td colspan="' + colsVisiveis + '" class="interval" style="border-left:1px solid #ccc">intervalo</td>';
                if (sabVazio) intervalHtml += '<td class="col-sab-oculto"></td>';
                intervalHtml += '</tr>';
                html += intervalHtml;
            }
            html += '<tr>';
            for (var d = 0; d < numDias; d++) {
                // Slots >= 5: Mon-Sex invisíveis; Sex mantém border-right para alinhar com Sáb
                if (s >= 5 && d < dSab) {
                    if (d === dSab - 1) {
                        html += '<td style="border:none;border-right:1px solid #ccc;background:white"></td>';
                    } else {
                        html += '<td class="slot-extra-oculto"></td>';
                    }
                    continue;
                }
                if (!grid[s][d].render) continue;
                var cell = periodo.slots[s] && periodo.slots[s][d];
                var sigla = (cell && cell.s) ? cell.s : '';
                var oculto = sabVazio && d === dSab;
                var cls = oculto ? 'col-sab-oculto' : (grid[s][d].alt ? 'alterado' : '');
                var attrs = cls ? ' class="' + cls + '"' : '';
                if (!oculto && d === 0) attrs += ' style="border-left:1px solid #ccc"';
                if (grid[s][d].span > 1) attrs += ' rowspan="' + grid[s][d].span + '"';
                html += '<td' + attrs + '>' + (oculto ? '' : sigla) + '</td>';
            }
            html += '</tr>';
        }

        html += '</tbody></table>';
        return html;
    }

    document.addEventListener('DOMContentLoaded', carregarHorarios);
})();
</script>
